<header class="site-header">
    <div class="container">
        <div class="header-inner">
            <a href="{{ '/' | relative_url }}" class="site-logo">
                <span class="logo-icon">📡</span>
                <span class="logo-text">Ground Station Alpha</span>
            </a>

            <nav class="site-nav">
                {% for link in site.theme_settings.nav_links %}
                <a href="{{ link.url | relative_url }}" class="nav-link{% if page.url == link.url %} active{% endif %}">
                    {{ link.title }}
                </a>
                {% endfor %}
            </nav>

            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <button class="search-toggle" id="search-toggle" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>

                <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </div>
</header>

<div class="search-overlay" id="search-overlay">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search transmissions..." autocomplete="off">
        <button class="search-close" id="search-close">×</button>
        <div id="search-results"></div>
    </div>
</div>

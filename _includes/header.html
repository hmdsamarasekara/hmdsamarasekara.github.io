<header class="site-header">
  <div class="header-content">
    <a href="{{ '/' | relative_url }}" class="site-brand">
      <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Noise Floor Nomad" class="brand-logo" width="32" height="32">
      <span class="brand-text">Noise Floor Nomad</span>
    </a>

    <nav class="site-nav">
      {% for link in site.theme_settings.nav_links %}
        <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
      {% endfor %}
    </nav>

    <div class="header-actions">
      <button class="search-toggle" id="search-toggle" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </button>

      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Search Overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search posts..." autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
  <button class="search-close" id="search-close" style="position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 2rem;">×</button>
</div>

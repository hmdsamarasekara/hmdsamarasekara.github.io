# Ground Station Alpha - Jekyll Configuration
# Technical Blog Theme for Satellite Communications

title: "Ground Station Alpha"
description: "UHF Satcom, HRPT Imagery, and Satellite Radio Adventures"
author: "HMD Samarasekara"
email: your-email@example.com
baseurl: ""
url: "https://hmdsamarasekara.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "HMD Samarasekara"
  - scope:
      path: ""
    values:
      layout: "default"

# Theme settings
theme_settings:
  # Appearance
  dark_mode_default: true
  accent_color: "#00ff41"  # Terminal green
  secondary_color: "#ff6b35"  # Sunset orange

  # Features
  show_reading_time: true
  show_tags: true
  show_categories: true
  enable_search: true
  enable_copy_code: true

  # Navigation
  nav_links:
    - title: "Home"
      url: "/"
    - title: "Posts"
      url: "/posts/"
    - title: "Categories"
      url: "/categories/"
    - title: "About"
      url: "/about/"

  # Social
  github: "hmdsamarasekara"
  twitter: ""
  rss: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata

# Noise Floor Nomad - Jekyll Configuration
# Ham radio, SDR, and satellite reception blog

title: "Noise Floor Nomad"
description: "Documenting practical ham radio, SDR, and satellite reception experiments from imperfect setups and real RF environments."
author: "A65KJ"
email: ""
baseurl: ""
url: "https://hmdsamarasekara.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "A65KJ"
  - scope:
      path: ""
    values:
      layout: "default"

# Theme settings
theme_settings:
  # Features
  show_reading_time: true
  show_tags: true
  show_categories: true
  enable_search: true
  enable_copy_code: true

  # Navigation
  nav_links:
    - title: "Home"
      url: "/"
    - title: "Posts"
      url: "/posts/"
    - title: "About"
      url: "/about/"

  # Social/Contact
  callsign: "A65KJ"
  qrz_url: "https://www.qrz.com/db/A65KJ"
  github: "hmdsamarasekara"
  rss: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
